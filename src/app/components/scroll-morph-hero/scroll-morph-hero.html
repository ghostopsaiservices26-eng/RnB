<div #containerRef
  class="relative w-full h-full overflow-hidden select-none"
  style="background:#FAFAFA; touch-action: none;">

  <!-- Wrapper: perspective -->
  <div class="flex h-full w-full flex-col items-center justify-center" style="perspective:1000px">

    <!-- Intro text (fades out as morph progresses) -->
    <div class="absolute z-0 flex flex-col items-center justify-center text-center pointer-events-none"
         style="top:50%; transform:translateY(-50%)">
      <h1 class="text-2xl font-medium tracking-tight text-gray-800 md:text-4xl transition-all duration-700"
          [style.opacity]="introTextOpacity"
          [style.filter]="introTextOpacity > 0 ? 'blur(0px)' : 'blur(10px)'">
        The future is built on AI.
      </h1>
      <p class="mt-4 text-xs font-bold tracking-widest text-gray-500 transition-opacity duration-700"
         [style.opacity]="introTextOpacity * 0.6">
        SCROLL TO EXPLORE
      </p>
    </div>

    <!-- Arc content (fades in when morph > 0.8) -->
    <div class="absolute top-[10%] z-10 flex flex-col items-center text-center pointer-events-none px-4 transition-all duration-500"
         [style.opacity]="contentOpacity"
         [style.transform]="'translateY(' + contentY + 'px)'">
      <h2 class="text-3xl md:text-5xl font-semibold text-gray-900 tracking-tight mb-4">
        Explore Our Vision
      </h2>
      <p class="text-sm md:text-base text-gray-600 max-w-lg leading-relaxed">
        Discover a world where technology meets creativity.<br class="hidden md:block" />
        Scroll through our curated collection of innovations designed to shape the future.
      </p>
    </div>

    <!-- Card stage: all cards are absolutely positioned relative to the center -->
    <div class="relative flex items-center justify-center w-full h-full">
      @for (src of images; track $index) {
        <div class="flip-card-wrapper absolute cursor-pointer"
             style="width:60px; height:85px; transform-style:preserve-3d; top:50%; left:50%;">
          <div class="flip-card-inner relative w-full h-full" style="transform-style:preserve-3d;">

            <!-- Front -->
            <div class="flip-front absolute inset-0 w-full h-full overflow-hidden rounded-xl shadow-lg bg-gray-200"
                 style="backface-visibility:hidden;">
              <img [src]="src"
                   [alt]="'photo-' + $index"
                   class="h-full w-full object-cover"
                   loading="lazy" />
              <div class="absolute inset-0 bg-black/10"></div>
            </div>

            <!-- Back -->
            <div class="flip-back absolute inset-0 w-full h-full overflow-hidden rounded-xl shadow-lg bg-gray-900
                        flex flex-col items-center justify-center p-2 border border-gray-700"
                 style="backface-visibility:hidden; transform:rotateY(180deg);">
              <p class="text-[8px] font-bold text-blue-400 uppercase tracking-widest mb-1">View</p>
              <p class="text-xs font-medium text-white">Details</p>
            </div>
          </div>
        </div>
      }
    </div>

  </div>
</div>
